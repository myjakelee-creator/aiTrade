<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>StockBoard 체결/OHLC 차트</title>
<link rel="stylesheet" href="assets/stockboard_execution_chart_v3.css?v=20260629_viewport" />
</head>
<body>
<main class="page">
  <section class="panel" aria-label="StockBoard 체결/OHLC 차트">
    <div class="title">
      <span>체결/OHLC 차트</span>
      <span class="status" id="status">대기</span>
    </div>

    <div class="controls">
      <label>날짜 <select id="date"></select></label>
      <label>종목 <select id="code"></select></label>
      <button type="button" id="reload">로드</button>
    </div>

    <div class="upload" aria-label="엑셀 업로드 후 로컬 JSON 저장">
      <label>저장 날짜 <input id="upload-date" value="20260626" inputmode="numeric" /></label>
      <label>종목코드 <input id="upload-code" value="000660" inputmode="numeric" /></label>
      <label>종목명 <input id="upload-name" value="SK하이닉스" /></label>
      <label class="wide">OHLC xlsx/csv <input type="file" id="ohlc-file" accept=".xlsx,.xlsm,.xls,.csv" /></label>
      <label class="wide">0110 체결분석 xlsx/csv 선택 <input type="file" id="execution-file" accept=".xlsx,.xlsm,.xls,.csv" /></label>
      <button type="button" id="upload">업로드 → 로컬 JSON 저장</button>
    </div>

    <div class="summary" id="summary">
      <span><b>종목</b> -</span><span><b>구간</b> -</span>
      <span><b>시가선</b> -</span><span><b>VWAP</b> -</span>
      <span><b>고가/저가</b> -</span><span><b>거래대금</b> -</span>
    </div>

    <div class="legend">
      <span><i class="dot red"></i> 상승/매수</span>
      <span><i class="dot blue"></i> 하락/매도</span>
      <span><i class="dot gold"></i> VWAP</span>
      <span><i class="dot green"></i> 09시 시가선</span>
    </div>

    <div class="zoombar">
      <button type="button" id="zoom-fit">화면맞춤</button>
      <button type="button" id="zoom-out">분폭-</button>
      <button type="button" id="zoom-in">분폭+</button>
      <span class="zoom-label" id="zoom-label">화면맞춤</span>
    </div>

    <div class="chartarea">
      <div class="viewport" id="viewport">
        <section class="card">
          <div class="ctitle"><span>1분 OHLC + VWAP + 시가선</span><span class="sub">보이는 구간 캔들 기준 y축</span></div>
          <div class="cwrap"><canvas id="price-canvas"></canvas></div>
        </section>
        <section class="card">
          <div class="ctitle"><span>체결강도</span><span class="sub">보이는 구간 기준</span></div>
          <div class="cwrap"><canvas id="strength-canvas"></canvas></div>
        </section>
        <section class="card">
          <div class="ctitle"><span>매수/매도 체결량</span><span class="sub">한 막대: 아래=매수, 위=매도</span></div>
          <div class="cwrap"><canvas id="volume-canvas"></canvas></div>
        </section>
      </div>

      <div class="rangebar">
        <span id="range-label">구간 이동</span>
        <input type="range" id="range" min="0" max="0" value="0" />
      </div>

      <div class="hover" id="hover">차트 서버 연결을 확인하는 중입니다.</div>
      <div class="note">
        차트 폭은 브라우저 폭에 맞게 고정됩니다. 분폭+/-는 차트 안에서 보이는 분봉 개수만 조절하고, 구간 이동 슬라이더로 전체 663분 중 볼 구간을 이동합니다.
      </div>
    </div>
  </section>
</main>
<script src="assets/stockboard_execution_chart_v3.js?v=20260629_viewport"></script>
</body>
</html>
