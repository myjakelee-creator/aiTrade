<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>StockBoard 우측 체결/OHLC 차트 샘플</title>
<style>
  :root {
    --bg: #f3f6f8;
    --line: #c8d0d8;
    --head: #e7edf3;
    --text: #17202a;
    --red: #d71920;
    --blue: #1266d6;
    --green: #18a558;
    --gold: #b8860b;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: Malgun Gothic, Arial, sans-serif;
  }
  .sample-shell {
    --chart-panel-width: 440px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 8px var(--chart-panel-width);
    gap: 0;
    height: 100vh;
    padding: 8px;
  }
  .stockboard-frame-wrap,
  .execution-chart-panel {
    min-width: 0;
    min-height: 0;
    border: 1px solid #9aa8b5;
    background: #fff;
    box-shadow: 0 2px 12px rgba(90, 100, 115, 0.22);
  }
  .stockboard-frame-wrap { overflow: hidden; }
  .stockboard-frame {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: #fff;
  }
  .sample-resizer {
    position: relative;
    z-index: 20;
    cursor: col-resize;
    background: transparent;
  }
  .sample-resizer::before {
    content: "";
    position: absolute;
    left: 3px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: #9aa8b5;
    opacity: 0.35;
  }
  .sample-resizer:hover::before,
  body.resizing-layout .sample-resizer::before {
    opacity: 1;
    background: #1266d6;
  }
  body.resizing-layout {
    cursor: col-resize;
    user-select: none;
  }
  body.resizing-layout iframe {
    pointer-events: none;
  }
  .execution-chart-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    margin-left: 0;
  }
  .execution-chart-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    min-height: 30px;
    padding: 5px 8px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(#dfe7ee, #cbd6df);
    color: #19324a;
    font-size: 13px;
    font-weight: 800;
    white-space: nowrap;
  }
  .execution-chart-status {
    max-width: 190px;
    overflow: hidden;
    color: #4b6175;
    font-size: 11px;
    font-weight: 700;
    text-overflow: ellipsis;
  }
  .execution-chart-controls {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 6px;
    padding: 7px 8px;
    border-bottom: 1px solid var(--line);
    background: #f8fbff;
  }
  .execution-chart-controls label {
    display: grid;
    gap: 3px;
    color: #4b6175;
    font-size: 11px;
    font-weight: 700;
  }
  .execution-chart-controls select,
  .execution-chart-controls button {
    height: 28px;
    border: 1px solid #9aa8b5;
    border-radius: 3px;
    background: #fff;
    color: #19324a;
    font: inherit;
    font-size: 12px;
    font-weight: 700;
  }
  .execution-chart-controls button {
    min-width: 58px;
    cursor: pointer;
  }
  .execution-chart-controls button:hover { background: #eef4fa; }
  .execution-chart-summary {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 4px 7px;
    padding: 7px 8px;
    border-bottom: 1px solid var(--line);
    background: #fff;
    font-size: 11px;
    line-height: 1.25;
  }
  .execution-chart-summary b {
    color: #263747;
    font-weight: 800;
  }
  .execution-chart-summary span {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .execution-chart-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 5px 8px;
    padding: 6px 8px;
    border-bottom: 1px solid var(--line);
    background: #f8fbff;
    font-size: 11px;
    font-weight: 700;
  }
  .legend-item {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
  }
  .legend-dot {
    width: 9px;
    height: 9px;
    border-radius: 2px;
    display: inline-block;
  }
  .legend-red { background: var(--red); }
  .legend-blue { background: var(--blue); }
  .legend-gold { background: var(--gold); }
  .legend-green { background: var(--green); }
  .legend-dark { background: #17202a; }
  .execution-chart-body {
    flex: 1 1 auto;
    min-height: 0;
    overflow: auto;
    padding: 8px;
    background: #fff;
  }
  .chart-card {
    margin-bottom: 9px;
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
    background: #fff;
  }
  .chart-card-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 26px;
    padding: 4px 7px;
    background: var(--head);
    color: #263747;
    font-size: 12px;
    font-weight: 800;
  }
  .chart-card-subtitle {
    color: #5f6f80;
    font-size: 10px;
    font-weight: 700;
  }
  .chart-scroll {
    width: 100%;
    overflow-x: auto;
    overflow-y: hidden;
    background: linear-gradient(90deg, #ffffff, #fbfdff);
  }
  canvas.execution-chart-canvas {
    display: block;
    background: #fff;
  }
  .execution-chart-hover {
    min-height: 70px;
    padding: 7px 8px;
    border-top: 1px solid var(--line);
    background: #111827;
    color: #f8fafc;
    font-size: 11px;
    line-height: 1.45;
    white-space: pre-line;
    font-variant-numeric: tabular-nums;
  }
  .execution-chart-note {
    margin-top: 2px;
    padding: 7px 8px;
    border: 1px solid #eadb9b;
    border-radius: 4px;
    background: #fff9db;
    color: #5f4700;
    font-size: 11px;
    line-height: 1.45;
  }
  @media (max-width: 1280px) {
    html, body { overflow: auto; }
    .sample-shell {
      display: block;
      height: auto;
      min-height: 100vh;
    }
    .stockboard-frame-wrap {
      height: 62vh;
      margin-bottom: 8px;
    }
    .sample-resizer { display: none; }
    .execution-chart-panel { height: 70vh; }
  }
</style>
</head>
<body>
<main class="sample-shell">
  <section class="stockboard-frame-wrap" aria-label="StockBoard 기존 화면">
    <iframe class="stockboard-frame" src="stockboard_v0_3_0_sample.html" title="StockBoard"></iframe>
  </section>

  <div class="sample-resizer" id="sample-resizer" aria-label="StockBoard와 우측 차트 폭 조절" title="좌우 폭 조절"></div>

  <aside class="execution-chart-panel" aria-label="StockBoard 우측 체결/OHLC 차트 샘플">
    <div class="execution-chart-title">
      <span>우측 체결/OHLC 차트 샘플</span>
      <span class="execution-chart-status" id="execution-chart-status">대기</span>
    </div>

    <div class="execution-chart-controls">
      <label>날짜
        <select id="execution-chart-date"></select>
      </label>
      <label>종목
        <select id="execution-chart-code"></select>
      </label>
      <button type="button" id="execution-chart-reload">로드</button>
    </div>

    <div class="execution-chart-summary" id="execution-chart-summary">
      <span><b>종목</b> -</span>
      <span><b>구간</b> -</span>
      <span><b>시가선</b> -</span>
      <span><b>VWAP</b> -</span>
      <span><b>고가/저가</b> -</span>
      <span><b>거래대금</b> -</span>
    </div>

    <div class="execution-chart-legend">
      <span class="legend-item"><i class="legend-dot legend-red"></i>상승/매수</span>
      <span class="legend-item"><i class="legend-dot legend-blue"></i>하락/매도</span>
      <span class="legend-item"><i class="legend-dot legend-gold"></i>VWAP</span>
      <span class="legend-item"><i class="legend-dot legend-green"></i>09시 시가선</span>
    </div>

    <div class="execution-chart-body">
      <section class="chart-card">
        <div class="chart-card-title">
          <span>1분 OHLC + VWAP + 시가선</span>
          <span class="chart-card-subtitle">통합장 전체 JSON</span>
        </div>
        <div class="chart-scroll">
          <canvas class="execution-chart-canvas" id="execution-price-canvas"></canvas>
        </div>
      </section>

      <section class="chart-card">
        <div class="chart-card-title">
          <span>체결강도</span>
          <span class="chart-card-subtitle">0110 병합 · 누락값 제외</span>
        </div>
        <div class="chart-scroll">
          <canvas class="execution-chart-canvas" id="execution-strength-canvas"></canvas>
        </div>
      </section>

      <section class="chart-card">
        <div class="chart-card-title">
          <span>매수/매도 체결량</span>
          <span class="chart-card-subtitle">위=매도, 아래=매수</span>
        </div>
        <div class="chart-scroll">
          <canvas class="execution-chart-canvas" id="execution-volume-canvas"></canvas>
        </div>
      </section>

      <div class="execution-chart-hover" id="execution-chart-hover">차트 index를 불러오는 중입니다.</div>

      <div class="execution-chart-note">
        1차 개선판은 날짜/종목별 정적 JSON을 사용합니다. 구글 드라이브 저장, 자동 업로드, 실시간 틱 집계, 서버 API 변경은 포함하지 않았습니다.
      </div>
    </div>
  </aside>
</main>

<script src="assets/stockboard_execution_chart.js?v=sample_20260628_b"></script>
</body>
</html>
